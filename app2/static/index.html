<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ask the Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ask the Model</h1>
    <form id="ask-form">
        <textarea id="text" rows="5" placeholder="Type your question..." required></textarea>
        <button type="submit">Ask</button>
    </form>
    <div class="results">
        <section>
            <h2>Without tool</h2>
            <div id="result-without"></div>
        </section>
        <section>
            <h2>With tool</h2>
            <div id="result-with"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
